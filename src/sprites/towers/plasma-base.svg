<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22">
  <defs>
    <linearGradient id="plasma-base-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a3858"/>
      <stop offset="50%" stop-color="#2e2040"/>
      <stop offset="100%" stop-color="#1a1228"/>
    </linearGradient>
    <radialGradient id="plasma-core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="20%" stop-color="#ff88ff"/>
      <stop offset="50%" stop-color="#cc00cc"/>
      <stop offset="80%" stop-color="#660066"/>
      <stop offset="100%" stop-color="#330033"/>
    </radialGradient>
    <radialGradient id="plasma-core-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ff00ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff00ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="plasma-base-sh" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0.5" dy="1" stdDeviation="0.7" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="plasma-core-filter" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Main circular housing -->
  <circle cx="11" cy="11" r="9" fill="url(#plasma-base-body)" filter="url(#plasma-base-sh)"/>
  <!-- Outer ring highlight -->
  <circle cx="11" cy="11" r="9" fill="none" stroke="#5a4868" stroke-width="0.6"/>
  <circle cx="11" cy="11" r="8.2" fill="none" stroke="#221830" stroke-width="0.3"/>
  <!-- Cooling fins radiating out -->
  <rect x="10.2" y="1.5" width="1.6" height="4" rx="0.3" fill="#3a2848" stroke="#221830" stroke-width="0.3"/>
  <rect x="10.2" y="16.5" width="1.6" height="4" rx="0.3" fill="#3a2848" stroke="#221830" stroke-width="0.3"/>
  <rect x="1.5" y="10.2" width="4" height="1.6" rx="0.3" fill="#3a2848" stroke="#221830" stroke-width="0.3"/>
  <rect x="16.5" y="10.2" width="4" height="1.6" rx="0.3" fill="#3a2848" stroke="#221830" stroke-width="0.3"/>
  <!-- Magenta glow aura -->
  <circle cx="11" cy="11" r="5" fill="url(#plasma-core-glow)"/>
  <!-- Core window ring -->
  <circle cx="11" cy="11" r="3.5" fill="none" stroke="#4a2850" stroke-width="0.8"/>
  <!-- Glowing energy core -->
  <circle cx="11" cy="11" r="2.8" fill="url(#plasma-core)" filter="url(#plasma-core-filter)"/>
  <circle cx="11" cy="11" r="1" fill="#fff" opacity="0.7"/>
  <!-- Magenta accent lines -->
  <line x1="5" y1="5" x2="7.5" y2="7.5" stroke="#f0f" stroke-width="0.3" opacity="0.5"/>
  <line x1="17" y1="5" x2="14.5" y2="7.5" stroke="#f0f" stroke-width="0.3" opacity="0.5"/>
  <line x1="5" y1="17" x2="7.5" y2="14.5" stroke="#f0f" stroke-width="0.3" opacity="0.5"/>
  <line x1="17" y1="17" x2="14.5" y2="14.5" stroke="#f0f" stroke-width="0.3" opacity="0.5"/>
</svg>