<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 22">
  <defs>
    <linearGradient id="msl-base-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a5540"/>
      <stop offset="40%" stop-color="#3e3a2a"/>
      <stop offset="100%" stop-color="#25221a"/>
    </linearGradient>
    <linearGradient id="msl-base-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a6550"/>
      <stop offset="100%" stop-color="#4a4535"/>
    </linearGradient>
    <linearGradient id="msl-radar-dish" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a8570"/>
      <stop offset="100%" stop-color="#5a5540"/>
    </linearGradient>
    <filter id="msl-base-sh" x="-3%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0.5" dy="1" stdDeviation="0.7" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Main armored body -->
  <rect x="2" y="3" width="28" height="16" rx="1.2" fill="url(#msl-base-body)" filter="url(#msl-base-sh)"/>
  <rect x="2" y="3" width="28" height="8" rx="1.2" fill="url(#msl-base-top)"/>
  <!-- Warning stripes (bottom left corner) -->
  <line x1="3" y1="17" x2="5.5" y2="17" stroke="#ddaa00" stroke-width="0.8"/>
  <line x1="4" y1="18" x2="6.5" y2="18" stroke="#ddaa00" stroke-width="0.8"/>
  <line x1="3" y1="17" x2="5.5" y2="17" stroke="#222" stroke-width="0.4" stroke-dasharray="0.8,0.8"/>
  <line x1="4" y1="18" x2="6.5" y2="18" stroke="#222" stroke-width="0.4" stroke-dasharray="0.8,0.8"/>
  <!-- Ammo bay door 1 -->
  <rect x="5" y="5" width="10" height="7" rx="0.5" fill="#1e1c15" stroke="#35321a" stroke-width="0.4"/>
  <line x1="10" y1="5.5" x2="10" y2="11.5" stroke="#2a2820" stroke-width="0.3"/>
  <!-- Ammo bay door 2 -->
  <rect x="17" y="5" width="10" height="7" rx="0.5" fill="#1e1c15" stroke="#35321a" stroke-width="0.4"/>
  <line x1="22" y1="5.5" x2="22" y2="11.5" stroke="#2a2820" stroke-width="0.3"/>
  <!-- Panel lines -->
  <line x1="3" y1="11" x2="29" y2="11" stroke="#1a1810" stroke-width="0.3"/>
  <line x1="16" y1="4" x2="16" y2="18" stroke="#1a1810" stroke-width="0.3"/>
  <!-- Radar dish mount on top -->
  <circle cx="26" cy="15" r="2.2" fill="url(#msl-radar-dish)" stroke="#3a3525" stroke-width="0.4"/>
  <circle cx="26" cy="15" r="1.2" fill="#4a4535" stroke="#3a3525" stroke-width="0.3"/>
  <line x1="26" y1="15" x2="26" y2="12.8" stroke="#6a6550" stroke-width="0.5"/>
  <circle cx="26" cy="15" r="0.4" fill="#8a8570"/>
  <!-- Orange accent line -->
  <line x1="3" y1="3.5" x2="29" y2="3.5" stroke="#f92" stroke-width="0.5" opacity="0.6"/>
  <!-- Corner rivets -->
  <circle cx="4.5" cy="5.5" r="0.5" fill="#4a4535" stroke="#1e1c15" stroke-width="0.2"/>
  <circle cx="27.5" cy="5.5" r="0.5" fill="#4a4535" stroke="#1e1c15" stroke-width="0.2"/>
  <circle cx="4.5" cy="16.5" r="0.5" fill="#4a4535" stroke="#1e1c15" stroke-width="0.2"/>
  <circle cx="27.5" cy="16.5" r="0.5" fill="#4a4535" stroke="#1e1c15" stroke-width="0.2"/>
  <!-- Bay door handles -->
  <rect x="9" y="8" width="2" height="0.6" rx="0.2" fill="#3a3525"/>
  <rect x="21" y="8" width="2" height="0.6" rx="0.2" fill="#3a3525"/>
</svg>