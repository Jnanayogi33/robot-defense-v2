<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 18">
  <defs>
    <linearGradient id="msl-lnch-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a5840"/>
      <stop offset="40%" stop-color="#3e3c2a"/>
      <stop offset="100%" stop-color="#28261a"/>
    </linearGradient>
    <linearGradient id="msl-lnch-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a6850"/>
      <stop offset="100%" stop-color="#4a4835"/>
    </linearGradient>
    <linearGradient id="msl-tube" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3828"/>
      <stop offset="50%" stop-color="#252318"/>
      <stop offset="100%" stop-color="#1a1810"/>
    </linearGradient>
    <filter id="msl-lnch-sh" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0.5" dy="1" stdDeviation="0.6" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <!-- Armored housing around tubes -->
  <rect x="0" y="1" width="20" height="16" rx="1" fill="url(#msl-lnch-body)" filter="url(#msl-lnch-sh)"/>
  <rect x="0" y="1" width="20" height="8" rx="1" fill="url(#msl-lnch-top)"/>
  <!-- 2x2 grid of missile tubes -->
  <!-- Top-left tube -->
  <rect x="2" y="2.5" width="7" height="5.5" rx="1" fill="url(#msl-tube)" stroke="#1a1810" stroke-width="0.3"/>
  <ellipse cx="5.5" cy="5.25" rx="2.5" ry="2" fill="#151310" stroke="#2a2818" stroke-width="0.3"/>
  <!-- Top-right tube -->
  <rect x="11" y="2.5" width="7" height="5.5" rx="1" fill="url(#msl-tube)" stroke="#1a1810" stroke-width="0.3"/>
  <ellipse cx="14.5" cy="5.25" rx="2.5" ry="2" fill="#151310" stroke="#2a2818" stroke-width="0.3"/>
  <!-- Bottom-left tube -->
  <rect x="2" y="10" width="7" height="5.5" rx="1" fill="url(#msl-tube)" stroke="#1a1810" stroke-width="0.3"/>
  <ellipse cx="5.5" cy="12.75" rx="2.5" ry="2" fill="#151310" stroke="#2a2818" stroke-width="0.3"/>
  <!-- Bottom-right tube -->
  <rect x="11" y="10" width="7" height="5.5" rx="1" fill="url(#msl-tube)" stroke="#1a1810" stroke-width="0.3"/>
  <ellipse cx="14.5" cy="12.75" rx="2.5" ry="2" fill="#151310" stroke="#2a2818" stroke-width="0.3"/>
  <!-- Loaded missile tips (orange triangles poking out) -->
  <polygon points="5.5,3.5 7,5.25 4,5.25" fill="#ff9922" stroke="#cc6600" stroke-width="0.2"/>
  <polygon points="14.5,3.5 16,5.25 13,5.25" fill="#ff9922" stroke="#cc6600" stroke-width="0.2"/>
  <polygon points="5.5,11 7,12.75 4,12.75" fill="#ff9922" stroke="#cc6600" stroke-width="0.2"/>
  <polygon points="14.5,11 16,12.75 13,12.75" fill="#ff9922" stroke="#cc6600" stroke-width="0.2"/>
  <!-- Missile body hints visible in tubes -->
  <rect x="4" y="5" width="3" height="0.5" rx="0.2" fill="#666050"/>
  <rect x="13" y="5" width="3" height="0.5" rx="0.2" fill="#666050"/>
  <rect x="4" y="12.5" width="3" height="0.5" rx="0.2" fill="#666050"/>
  <rect x="13" y="12.5" width="3" height="0.5" rx="0.2" fill="#666050"/>
  <!-- Housing edge details -->
  <line x1="0.5" y1="9" x2="19.5" y2="9" stroke="#1a1810" stroke-width="0.3"/>
  <line x1="10" y1="1.5" x2="10" y2="16.5" stroke="#1a1810" stroke-width="0.3"/>
  <!-- Mounting bracket at left -->
  <rect x="19" y="6" width="3" height="6" rx="0.5" fill="#3a3828" stroke="#252318" stroke-width="0.3"/>
  <line x1="19.5" y1="7" x2="21.5" y2="7" stroke="#1a1810" stroke-width="0.3"/>
  <line x1="19.5" y1="11" x2="21.5" y2="11" stroke="#1a1810" stroke-width="0.3"/>
</svg>