<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 26 18">
  <defs>
    <linearGradient id="cryo-base-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a7080"/>
      <stop offset="45%" stop-color="#3a5565"/>
      <stop offset="100%" stop-color="#223545"/>
    </linearGradient>
    <linearGradient id="cryo-base-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a8090"/>
      <stop offset="100%" stop-color="#4a6575"/>
    </linearGradient>
    <radialGradient id="cryo-tank" cx="0.4" cy="0.35" r="0.5">
      <stop offset="0%" stop-color="#8ab8cc"/>
      <stop offset="40%" stop-color="#4a8599"/>
      <stop offset="100%" stop-color="#2a5565"/>
    </radialGradient>
    <radialGradient id="cryo-gauge" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#aaeeff"/>
      <stop offset="60%" stop-color="#44aacc"/>
      <stop offset="100%" stop-color="#225566"/>
    </radialGradient>
    <filter id="cryo-base-sh" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0.5" dy="1" stdDeviation="0.6" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <!-- Main central housing -->
  <rect x="7" y="3" width="12" height="12" rx="1.5" fill="url(#cryo-base-body)" filter="url(#cryo-base-sh)"/>
  <rect x="7" y="3" width="12" height="6" rx="1.5" fill="url(#cryo-base-top)"/>
  <!-- Left coolant tank -->
  <circle cx="4.5" cy="9" r="3.5" fill="url(#cryo-tank)" stroke="#2a4555" stroke-width="0.4"/>
  <circle cx="4.5" cy="9" r="2.5" fill="none" stroke="#6ef" stroke-width="0.2" opacity="0.4"/>
  <!-- Right coolant tank -->
  <circle cx="21.5" cy="9" r="3.5" fill="url(#cryo-tank)" stroke="#2a4555" stroke-width="0.4"/>
  <circle cx="21.5" cy="9" r="2.5" fill="none" stroke="#6ef" stroke-width="0.2" opacity="0.4"/>
  <!-- Pipe connections -->
  <rect x="7.5" y="7.5" width="3.5" height="1.8" rx="0.5" fill="#3a5060" stroke="#2a4050" stroke-width="0.3"/>
  <rect x="15" y="7.5" width="3.5" height="1.8" rx="0.5" fill="#3a5060" stroke="#2a4050" stroke-width="0.3"/>
  <!-- Pipe accent lines -->
  <line x1="8" y1="7.8" x2="11" y2="7.8" stroke="#6ef" stroke-width="0.2" opacity="0.5"/>
  <line x1="15.5" y1="7.8" x2="18.5" y2="7.8" stroke="#6ef" stroke-width="0.2" opacity="0.5"/>
  <!-- Center panel lines -->
  <line x1="8" y1="9" x2="18" y2="9" stroke="#1a3040" stroke-width="0.3"/>
  <line x1="13" y1="4" x2="13" y2="14" stroke="#1a3040" stroke-width="0.3"/>
  <!-- Pressure gauge -->
  <circle cx="11" cy="12" r="1.3" fill="url(#cryo-gauge)" stroke="#2a4555" stroke-width="0.3"/>
  <line x1="11" y1="12" x2="11.8" y2="11.3" stroke="#fff" stroke-width="0.3" opacity="0.7"/>
  <!-- Frost crystal decorations -->
  <line x1="3" y1="4" x2="4.5" y2="5.5" stroke="#6ef" stroke-width="0.3" opacity="0.6"/>
  <line x1="4.5" y1="4" x2="3" y2="5.5" stroke="#6ef" stroke-width="0.3" opacity="0.6"/>
  <line x1="21" y1="4" x2="22.5" y2="5.5" stroke="#6ef" stroke-width="0.3" opacity="0.6"/>
  <line x1="22.5" y1="4" x2="21" y2="5.5" stroke="#6ef" stroke-width="0.3" opacity="0.6"/>
  <!-- Tank rivets -->
  <circle cx="4.5" cy="6" r="0.4" fill="#6a8a9a" stroke="#2a4555" stroke-width="0.2"/>
  <circle cx="21.5" cy="6" r="0.4" fill="#6a8a9a" stroke="#2a4555" stroke-width="0.2"/>
</svg>