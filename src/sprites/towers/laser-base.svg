<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
  <defs>
    <linearGradient id="laser-base-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#505560"/>
      <stop offset="50%" stop-color="#35393f"/>
      <stop offset="100%" stop-color="#22252a"/>
    </linearGradient>
    <linearGradient id="laser-base-top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5e636b"/>
      <stop offset="100%" stop-color="#3a3e44"/>
    </linearGradient>
    <radialGradient id="laser-led" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#afffaf"/>
      <stop offset="40%" stop-color="#22dd22"/>
      <stop offset="100%" stop-color="#0a6e0a"/>
    </radialGradient>
    <filter id="laser-base-sh" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0.5" dy="1" stdDeviation="0.6" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <filter id="laser-led-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Main housing body -->
  <rect x="3" y="4" width="14" height="14" rx="1.5" ry="1.5" fill="url(#laser-base-body)" filter="url(#laser-base-sh)"/>
  <!-- Top face (rounded) -->
  <rect x="3" y="4" width="14" height="7" rx="1.5" ry="1.5" fill="url(#laser-base-top)"/>
  <!-- Cyan accent trim - top -->
  <line x1="4" y1="4.5" x2="16" y2="4.5" stroke="#0ff" stroke-width="0.6" opacity="0.8"/>
  <!-- Cyan accent trim - bottom -->
  <line x1="4" y1="17.5" x2="16" y2="17.5" stroke="#0ff" stroke-width="0.4" opacity="0.5"/>
  <!-- Panel line -->
  <line x1="4" y1="11" x2="16" y2="11" stroke="#1a1c20" stroke-width="0.4"/>
  <!-- Vent slits - left side -->
  <rect x="3.3" y="7" width="0.8" height="1.2" rx="0.2" fill="#1a1c1e"/>
  <rect x="3.3" y="9" width="0.8" height="1.2" rx="0.2" fill="#1a1c1e"/>
  <!-- Vent slits - right side -->
  <rect x="15.9" y="7" width="0.8" height="1.2" rx="0.2" fill="#1a1c1e"/>
  <rect x="15.9" y="9" width="0.8" height="1.2" rx="0.2" fill="#1a1c1e"/>
  <!-- Cyan side accents -->
  <rect x="3.3" y="7" width="0.8" height="1.2" rx="0.2" fill="#0cc" opacity="0.15"/>
  <rect x="15.9" y="7" width="0.8" height="1.2" rx="0.2" fill="#0cc" opacity="0.15"/>
  <!-- Status LED -->
  <circle cx="10" cy="14.5" r="1" fill="url(#laser-led)" filter="url(#laser-led-glow)"/>
  <!-- Corner details -->
  <circle cx="5.5" cy="6" r="0.5" fill="#3a3e44" stroke="#222" stroke-width="0.2"/>
  <circle cx="14.5" cy="6" r="0.5" fill="#3a3e44" stroke="#222" stroke-width="0.2"/>
</svg>