<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 10">
  <defs>
    <linearGradient id="rail-brl-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a5855"/>
      <stop offset="35%" stop-color="#45433f"/>
      <stop offset="100%" stop-color="#2a2825"/>
    </linearGradient>
    <linearGradient id="rail-brl-hi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6e6c68" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#45433f" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rail-mag" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#cc5500"/>
      <stop offset="50%" stop-color="#ff7722"/>
      <stop offset="100%" stop-color="#cc5500"/>
    </linearGradient>
    <filter id="rail-brl-sh" x="-2%" y="-10%" width="108%" height="130%">
      <feDropShadow dx="0" dy="0.5" stdDeviation="0.4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="rail-mag-glow" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="0.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Main barrel body -->
  <rect x="0" y="3" width="28" height="4" rx="0.5" fill="url(#rail-brl-body)" filter="url(#rail-brl-sh)"/>
  <!-- Top highlight -->
  <rect x="0" y="3" width="28" height="1.8" rx="0.5" fill="url(#rail-brl-hi)"/>
  <!-- Magnetic rail lines (orange glow) -->
  <line x1="2" y1="3.5" x2="27" y2="3.5" stroke="url(#rail-mag)" stroke-width="0.5" filter="url(#rail-mag-glow)" opacity="0.8"/>
  <line x1="2" y1="6.5" x2="27" y2="6.5" stroke="url(#rail-mag)" stroke-width="0.5" filter="url(#rail-mag-glow)" opacity="0.8"/>
  <!-- Panel lines along barrel -->
  <line x1="6" y1="3.2" x2="6" y2="6.8" stroke="#1e1c1a" stroke-width="0.25"/>
  <line x1="10" y1="3.2" x2="10" y2="6.8" stroke="#1e1c1a" stroke-width="0.25"/>
  <line x1="15" y1="3.2" x2="15" y2="6.8" stroke="#1e1c1a" stroke-width="0.25"/>
  <line x1="20" y1="3.2" x2="20" y2="6.8" stroke="#1e1c1a" stroke-width="0.25"/>
  <!-- Base mounting ring -->
  <rect x="0" y="2.2" width="2.5" height="5.6" rx="0.5" fill="#3a3835" stroke="#1e1c1a" stroke-width="0.3"/>
  <!-- Muzzle brake at tip -->
  <rect x="27" y="2" width="5" height="6" rx="0.5" fill="#3a3835" stroke="#2a2825" stroke-width="0.3"/>
  <!-- Muzzle brake slits -->
  <line x1="28.5" y1="2.5" x2="28.5" y2="8" stroke="#1a1815" stroke-width="0.5"/>
  <line x1="30" y1="2.5" x2="30" y2="8" stroke="#1a1815" stroke-width="0.5"/>
  <!-- Orange muzzle glow -->
  <rect x="27.5" y="2.3" width="4.2" height="5.4" rx="0.4" fill="none" stroke="#f60" stroke-width="0.3" opacity="0.5"/>
  <!-- Barrel detail rivet -->
  <circle cx="4" cy="5" r="0.5" fill="#4a4842" stroke="#1e1c1a" stroke-width="0.2"/>
  <circle cx="12" cy="5" r="0.5" fill="#4a4842" stroke="#1e1c1a" stroke-width="0.2"/>
</svg>