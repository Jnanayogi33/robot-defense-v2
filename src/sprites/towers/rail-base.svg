<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 18">
  <defs>
    <linearGradient id="rail-base-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#585550"/>
      <stop offset="40%" stop-color="#3e3b38"/>
      <stop offset="100%" stop-color="#252320"/>
    </linearGradient>
    <linearGradient id="rail-base-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#686560"/>
      <stop offset="100%" stop-color="#484540"/>
    </linearGradient>
    <radialGradient id="rail-status" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#ffbb55"/>
      <stop offset="50%" stop-color="#ff6600"/>
      <stop offset="100%" stop-color="#993300"/>
    </radialGradient>
    <filter id="rail-base-sh" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0.5" dy="1" stdDeviation="0.6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="rail-led-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Main armored box housing -->
  <rect x="2" y="2" width="18" height="14" rx="1" fill="url(#rail-base-body)" filter="url(#rail-base-sh)"/>
  <!-- Top face -->
  <rect x="2" y="2" width="18" height="7" rx="1" fill="url(#rail-base-top)"/>
  <!-- Ammo chamber inset -->
  <rect x="5" y="4" width="8" height="5" rx="0.5" fill="#1a1815" stroke="#302e2a" stroke-width="0.4"/>
  <line x1="5.5" y1="6.5" x2="12.5" y2="6.5" stroke="#252320" stroke-width="0.3"/>
  <!-- Heat vent grilles - right side -->
  <line x1="15" y1="4" x2="18" y2="4" stroke="#1a1815" stroke-width="0.6"/>
  <line x1="15" y1="5.2" x2="18" y2="5.2" stroke="#1a1815" stroke-width="0.6"/>
  <line x1="15" y1="6.4" x2="18" y2="6.4" stroke="#1a1815" stroke-width="0.6"/>
  <line x1="15" y1="7.6" x2="18" y2="7.6" stroke="#1a1815" stroke-width="0.6"/>
  <!-- Orange accent lines -->
  <line x1="3" y1="2.5" x2="19" y2="2.5" stroke="#f60" stroke-width="0.4" opacity="0.6"/>
  <line x1="3" y1="15.5" x2="19" y2="15.5" stroke="#f60" stroke-width="0.3" opacity="0.4"/>
  <!-- Panel lines -->
  <line x1="3" y1="9" x2="19" y2="9" stroke="#1a1815" stroke-width="0.3"/>
  <line x1="14" y1="3" x2="14" y2="15" stroke="#1a1815" stroke-width="0.3"/>
  <!-- Orange status indicator -->
  <circle cx="17" cy="12" r="1" fill="url(#rail-status)" filter="url(#rail-led-glow)"/>
  <!-- Corner rivets -->
  <circle cx="4" cy="4" r="0.6" fill="#4a4742" stroke="#1a1815" stroke-width="0.2"/>
  <circle cx="4" cy="14" r="0.6" fill="#4a4742" stroke="#1a1815" stroke-width="0.2"/>
  <circle cx="18" cy="14" r="0.6" fill="#4a4742" stroke="#1a1815" stroke-width="0.2"/>
</svg>