<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 26">
  <defs>
    <!-- Body metallic gradient -->
    <linearGradient id="scout-body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c44"/>
      <stop offset="40%" stop-color="#a33"/>
      <stop offset="100%" stop-color="#922"/>
    </linearGradient>
    <!-- Leg metallic gradient -->
    <linearGradient id="scout-leg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#888"/>
      <stop offset="50%" stop-color="#aaa"/>
      <stop offset="100%" stop-color="#777"/>
    </linearGradient>
    <!-- Head gradient -->
    <linearGradient id="scout-head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b33"/>
      <stop offset="100%" stop-color="#822"/>
    </linearGradient>
    <!-- Visor glow radial -->
    <radialGradient id="scout-visor-glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#ff4444" stop-opacity="1"/>
      <stop offset="60%" stop-color="#ff0000" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0"/>
    </radialGradient>
    <!-- Antenna tip glow -->
    <radialGradient id="scout-antenna-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ff6666"/>
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0"/>
    </radialGradient>
    <!-- Visor glow filter -->
    <filter id="scout-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8"/>
    </filter>
    <!-- Antenna glow filter -->
    <filter id="scout-antenna-filter" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- Left leg (back leg, further away) -->
  <g>
    <!-- Upper leg segment -->
    <line x1="6" y1="16" x2="4.5" y2="20" stroke="url(#scout-leg)" stroke-width="1.4" stroke-linecap="round"/>
    <!-- Lower leg segment -->
    <line x1="4.5" y1="20" x2="5.5" y2="23.5" stroke="url(#scout-leg)" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Foot/tread -->
    <rect x="4" y="23" width="3" height="1.2" rx="0.3" fill="#666"/>
    <line x1="4.5" y1="23.5" x2="6.5" y2="23.5" stroke="#555" stroke-width="0.3"/>
  </g>

  <!-- Right leg (front leg, stepping forward) -->
  <g>
    <!-- Upper leg segment -->
    <line x1="10" y1="16" x2="11.5" y2="19.5" stroke="url(#scout-leg)" stroke-width="1.4" stroke-linecap="round"/>
    <!-- Lower leg segment -->
    <line x1="11.5" y1="19.5" x2="10" y2="23" stroke="url(#scout-leg)" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Foot/tread -->
    <rect x="8.5" y="22.5" width="3" height="1.2" rx="0.3" fill="#666"/>
    <line x1="9" y1="23" x2="11" y2="23" stroke="#555" stroke-width="0.3"/>
  </g>

  <!-- Knee joints -->
  <circle cx="4.5" cy="20" r="0.8" fill="#999" stroke="#666" stroke-width="0.3"/>
  <circle cx="11.5" cy="19.5" r="0.8" fill="#999" stroke="#666" stroke-width="0.3"/>

  <!-- Hip joints -->
  <circle cx="6" cy="16" r="0.7" fill="#888"/>
  <circle cx="10" cy="16" r="0.7" fill="#888"/>

  <!-- Body / Torso - elongated and thin -->
  <rect x="5.5" y="7" width="5" height="10" rx="1" fill="url(#scout-body)" stroke="#711" stroke-width="0.4"/>
  <!-- Panel line down center -->
  <line x1="8" y1="8" x2="8" y2="16" stroke="#711" stroke-width="0.3" opacity="0.6"/>
  <!-- Horizontal panel line -->
  <line x1="6" y1="11" x2="10.5" y2="11" stroke="#711" stroke-width="0.3" opacity="0.6"/>
  <!-- Chest accent plate -->
  <rect x="6.5" y="8" width="3" height="2.5" rx="0.3" fill="none" stroke="#d55" stroke-width="0.3" opacity="0.5"/>

  <!-- Neck -->
  <rect x="7" y="5.5" width="2" height="2" rx="0.3" fill="#777" stroke="#555" stroke-width="0.3"/>

  <!-- Head - compact rectangular -->
  <rect x="5" y="3" width="6" height="3" rx="0.6" fill="url(#scout-head)" stroke="#611" stroke-width="0.4"/>
  <!-- Head top ridge -->
  <line x1="5.5" y1="3.3" x2="10.5" y2="3.3" stroke="#c55" stroke-width="0.3" opacity="0.4"/>

  <!-- Visor glow layer (behind) -->
  <rect x="5.5" y="4" width="5" height="1.2" rx="0.3" fill="url(#scout-visor-glow)" filter="url(#scout-glow)"/>
  <!-- Visor -->
  <rect x="5.5" y="4" width="5" height="1.2" rx="0.3" fill="#f00" opacity="0.9"/>
  <!-- Visor highlight -->
  <rect x="6" y="4.2" width="2" height="0.4" rx="0.2" fill="#f66" opacity="0.6"/>

  <!-- Antenna -->
  <line x1="8" y1="3" x2="8" y2="0.8" stroke="#999" stroke-width="0.5" stroke-linecap="round"/>
  <!-- Antenna tip glow -->
  <circle cx="8" cy="0.8" r="1" fill="url(#scout-antenna-glow)" filter="url(#scout-antenna-filter)"/>
  <circle cx="8" cy="0.8" r="0.5" fill="#f00"/>
</svg>
