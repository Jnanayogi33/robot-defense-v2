<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 44">
  <defs>
    <!-- Body armor gradient -->
    <linearGradient id="titan-body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ccc"/>
      <stop offset="40%" stop-color="#bbb"/>
      <stop offset="100%" stop-color="#999"/>
    </linearGradient>
    <!-- Body top highlight -->
    <linearGradient id="titan-body-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ddd"/>
      <stop offset="100%" stop-color="#aaa"/>
    </linearGradient>
    <!-- Leg gradient -->
    <linearGradient id="titan-leg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#888"/>
      <stop offset="50%" stop-color="#aaa"/>
      <stop offset="100%" stop-color="#777"/>
    </linearGradient>
    <!-- Piston gradient -->
    <linearGradient id="titan-piston" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bbb"/>
      <stop offset="50%" stop-color="#ddd"/>
      <stop offset="100%" stop-color="#aaa"/>
    </linearGradient>
    <!-- Head gradient -->
    <linearGradient id="titan-head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ccc"/>
      <stop offset="100%" stop-color="#999"/>
    </linearGradient>
    <!-- Weapon pod gradient -->
    <linearGradient id="titan-weapon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#aaa"/>
      <stop offset="100%" stop-color="#777"/>
    </linearGradient>
    <!-- Foot gradient -->
    <linearGradient id="titan-foot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#777"/>
      <stop offset="100%" stop-color="#555"/>
    </linearGradient>
    <!-- Reactor core glow (blue/white) -->
    <radialGradient id="titan-reactor" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="20%" stop-color="#ccddff" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#88bbff" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#4488ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4488ff" stop-opacity="0"/>
    </radialGradient>
    <!-- Visor glow (red) -->
    <radialGradient id="titan-visor-glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#ff8888" stop-opacity="1"/>
      <stop offset="50%" stop-color="#ff4444" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff4444" stop-opacity="0"/>
    </radialGradient>
    <!-- Antenna tip glow -->
    <radialGradient id="titan-antenna-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ff6666"/>
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0"/>
    </radialGradient>
    <!-- Core glow filter -->
    <filter id="titan-core-filter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8"/>
    </filter>
    <!-- Visor glow filter -->
    <filter id="titan-visor-filter" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1"/>
    </filter>
    <!-- Antenna glow filter -->
    <filter id="titan-antenna-filter" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- Rear left leg -->
  <g>
    <!-- Upper leg -->
    <rect x="7" y="27" width="4" height="6" rx="0.6" fill="url(#titan-leg)" stroke="#666" stroke-width="0.4"/>
    <!-- Hydraulic joint -->
    <circle cx="9" cy="33" r="2" fill="#888" stroke="#666" stroke-width="0.4"/>
    <circle cx="9" cy="33" r="0.8" fill="#aaa"/>
    <!-- Lower leg -->
    <rect x="7.5" y="34" width="3.5" height="5" rx="0.5" fill="url(#titan-leg)" stroke="#666" stroke-width="0.4"/>
    <!-- Piston -->
    <rect x="5.5" y="28.5" width="1.2" height="7" rx="0.3" fill="url(#titan-piston)" stroke="#999" stroke-width="0.2"/>
    <rect x="5.8" y="32" width="0.6" height="4" rx="0.2" fill="#ddd"/>
    <!-- Foot -->
    <rect x="5.5" y="38.5" width="6" height="2.5" rx="0.6" fill="url(#titan-foot)" stroke="#444" stroke-width="0.4"/>
    <line x1="6.5" y1="39.5" x2="10.5" y2="39.5" stroke="#666" stroke-width="0.3"/>
  </g>

  <!-- Rear right leg -->
  <g>
    <rect x="27" y="27" width="4" height="6" rx="0.6" fill="url(#titan-leg)" stroke="#666" stroke-width="0.4"/>
    <circle cx="29" cy="33" r="2" fill="#888" stroke="#666" stroke-width="0.4"/>
    <circle cx="29" cy="33" r="0.8" fill="#aaa"/>
    <rect x="27.5" y="34" width="3.5" height="5" rx="0.5" fill="url(#titan-leg)" stroke="#666" stroke-width="0.4"/>
    <rect x="31.5" y="28.5" width="1.2" height="7" rx="0.3" fill="url(#titan-piston)" stroke="#999" stroke-width="0.2"/>
    <rect x="31.8" y="32" width="0.6" height="4" rx="0.2" fill="#ddd"/>
    <rect x="26" y="38.5" width="6" height="2.5" rx="0.6" fill="url(#titan-foot)" stroke="#444" stroke-width="0.4"/>
    <line x1="27" y1="39.5" x2="31" y2="39.5" stroke="#666" stroke-width="0.3"/>
  </g>

  <!-- Front left leg -->
  <g>
    <rect x="9" y="24" width="4" height="6" rx="0.6" fill="url(#titan-leg)" stroke="#666" stroke-width="0.4"/>
    <circle cx="11" cy="30" r="2" fill="#888" stroke="#666" stroke-width="0.4"/>
    <circle cx="11" cy="30" r="0.8" fill="#aaa"/>
    <rect x="9.5" y="31" width="3.5" height="5.5" rx="0.5" fill="url(#titan-leg)" stroke="#666" stroke-width="0.4"/>
    <rect x="7.5" y="25.5" width="1.2" height="7" rx="0.3" fill="url(#titan-piston)" stroke="#999" stroke-width="0.2"/>
    <rect x="7.8" y="29" width="0.6" height="4" rx="0.2" fill="#ddd"/>
    <rect x="8" y="36" width="6" height="2.5" rx="0.6" fill="url(#titan-foot)" stroke="#444" stroke-width="0.4"/>
    <line x1="9" y1="37" x2="13" y2="37" stroke="#666" stroke-width="0.3"/>
  </g>

  <!-- Front right leg -->
  <g>
    <rect x="25" y="24" width="4" height="6" rx="0.6" fill="url(#titan-leg)" stroke="#666" stroke-width="0.4"/>
    <circle cx="27" cy="30" r="2" fill="#888" stroke="#666" stroke-width="0.4"/>
    <circle cx="27" cy="30" r="0.8" fill="#aaa"/>
    <rect x="25.5" y="31" width="3.5" height="5.5" rx="0.5" fill="url(#titan-leg)" stroke="#666" stroke-width="0.4"/>
    <rect x="29.5" y="25.5" width="1.2" height="7" rx="0.3" fill="url(#titan-piston)" stroke="#999" stroke-width="0.2"/>
    <rect x="29.8" y="29" width="0.6" height="4" rx="0.2" fill="#ddd"/>
    <rect x="24" y="36" width="6" height="2.5" rx="0.6" fill="url(#titan-foot)" stroke="#444" stroke-width="0.4"/>
    <line x1="25" y1="37" x2="29" y2="37" stroke="#666" stroke-width="0.3"/>
  </g>

  <!-- Main body / hull -->
  <rect x="6" y="10" width="26" height="16" rx="1.5" fill="url(#titan-body)" stroke="#888" stroke-width="0.6"/>
  <!-- Upper body plate -->
  <rect x="7" y="11" width="24" height="6" rx="0.8" fill="url(#titan-body-top)" opacity="0.5"/>

  <!-- Armor panel lines -->
  <line x1="13" y1="10.5" x2="13" y2="25.5" stroke="#888" stroke-width="0.4" opacity="0.5"/>
  <line x1="20" y1="10.5" x2="20" y2="25.5" stroke="#888" stroke-width="0.4" opacity="0.5"/>
  <line x1="27" y1="10.5" x2="27" y2="25.5" stroke="#888" stroke-width="0.4" opacity="0.5"/>
  <line x1="7" y1="15" x2="31" y2="15" stroke="#888" stroke-width="0.4" opacity="0.5"/>
  <line x1="7" y1="20" x2="31" y2="20" stroke="#888" stroke-width="0.4" opacity="0.5"/>

  <!-- Rivet rows - top edge -->
  <circle cx="8" cy="10.8" r="0.4" fill="#bbb"/>
  <circle cx="11" cy="10.8" r="0.4" fill="#bbb"/>
  <circle cx="14" cy="10.8" r="0.4" fill="#bbb"/>
  <circle cx="17" cy="10.8" r="0.4" fill="#bbb"/>
  <circle cx="20" cy="10.8" r="0.4" fill="#bbb"/>
  <circle cx="23" cy="10.8" r="0.4" fill="#bbb"/>
  <circle cx="26" cy="10.8" r="0.4" fill="#bbb"/>
  <circle cx="29" cy="10.8" r="0.4" fill="#bbb"/>
  <!-- Rivet rows - bottom edge -->
  <circle cx="8" cy="25.2" r="0.4" fill="#bbb"/>
  <circle cx="11" cy="25.2" r="0.4" fill="#bbb"/>
  <circle cx="14" cy="25.2" r="0.4" fill="#bbb"/>
  <circle cx="17" cy="25.2" r="0.4" fill="#bbb"/>
  <circle cx="20" cy="25.2" r="0.4" fill="#bbb"/>
  <circle cx="23" cy="25.2" r="0.4" fill="#bbb"/>
  <circle cx="26" cy="25.2" r="0.4" fill="#bbb"/>
  <circle cx="29" cy="25.2" r="0.4" fill="#bbb"/>
  <!-- Rivet rows - side edges -->
  <circle cx="6.8" cy="13" r="0.4" fill="#bbb"/>
  <circle cx="6.8" cy="17" r="0.4" fill="#bbb"/>
  <circle cx="6.8" cy="21" r="0.4" fill="#bbb"/>
  <circle cx="31.2" cy="13" r="0.4" fill="#bbb"/>
  <circle cx="31.2" cy="17" r="0.4" fill="#bbb"/>
  <circle cx="31.2" cy="21" r="0.4" fill="#bbb"/>

  <!-- Reactor core glow (blue/white) -->
  <circle cx="19" cy="18" r="4.5" fill="url(#titan-reactor)" filter="url(#titan-core-filter)"/>
  <!-- Reactor housing -->
  <circle cx="19" cy="18" r="2.8" fill="#4488ff" opacity="0.5" stroke="#6699ff" stroke-width="0.4"/>
  <circle cx="19" cy="18" r="1.8" fill="#88bbff" opacity="0.7"/>
  <circle cx="19" cy="18" r="0.8" fill="#fff"/>
  <!-- Reactor ring -->
  <circle cx="19" cy="18" r="3.2" fill="none" stroke="#aaccff" stroke-width="0.3" opacity="0.5"/>

  <!-- Left weapon pod (shoulder-mounted) -->
  <rect x="3" y="11" width="5" height="4" rx="0.5" fill="url(#titan-weapon)" stroke="#666" stroke-width="0.4"/>
  <!-- Weapon pod barrel slots -->
  <rect x="3.5" y="11.5" width="1" height="0.6" rx="0.2" fill="#555"/>
  <rect x="3.5" y="12.5" width="1" height="0.6" rx="0.2" fill="#555"/>
  <rect x="3.5" y="13.5" width="1" height="0.6" rx="0.2" fill="#555"/>
  <line x1="5.5" y1="11.5" x2="5.5" y2="14.5" stroke="#888" stroke-width="0.3" opacity="0.4"/>
  <!-- Pod rivet -->
  <circle cx="6.5" cy="13" r="0.3" fill="#ccc"/>

  <!-- Right weapon pod -->
  <rect x="30" y="11" width="5" height="4" rx="0.5" fill="url(#titan-weapon)" stroke="#666" stroke-width="0.4"/>
  <rect x="33.5" y="11.5" width="1" height="0.6" rx="0.2" fill="#555"/>
  <rect x="33.5" y="12.5" width="1" height="0.6" rx="0.2" fill="#555"/>
  <rect x="33.5" y="13.5" width="1" height="0.6" rx="0.2" fill="#555"/>
  <line x1="32.5" y1="11.5" x2="32.5" y2="14.5" stroke="#888" stroke-width="0.3" opacity="0.4"/>
  <circle cx="31.5" cy="13" r="0.3" fill="#ccc"/>

  <!-- Neck -->
  <rect x="15" y="6.5" width="8" height="4" rx="0.6" fill="#999" stroke="#777" stroke-width="0.3"/>

  <!-- Angular head -->
  <polygon points="13,3.5 25,3.5 26.5,6 27,8 11,8 11.5,6" fill="url(#titan-head)" stroke="#888" stroke-width="0.5"/>
  <!-- Head panel lines -->
  <line x1="14" y1="4" x2="24" y2="4" stroke="#bbb" stroke-width="0.3" opacity="0.3"/>
  <line x1="19" y1="3.8" x2="19" y2="7.5" stroke="#888" stroke-width="0.3" opacity="0.4"/>

  <!-- Visor glow (behind) -->
  <rect x="13.5" y="5" width="11" height="2" rx="0.5" fill="url(#titan-visor-glow)" filter="url(#titan-visor-filter)"/>
  <!-- Visor -->
  <rect x="13.5" y="5" width="11" height="2" rx="0.5" fill="#f44" opacity="0.85"/>
  <!-- Visor slit dividers -->
  <line x1="16" y1="5.1" x2="16" y2="6.9" stroke="#c22" stroke-width="0.4" opacity="0.6"/>
  <line x1="19" y1="5.1" x2="19" y2="6.9" stroke="#c22" stroke-width="0.4" opacity="0.6"/>
  <line x1="22" y1="5.1" x2="22" y2="6.9" stroke="#c22" stroke-width="0.4" opacity="0.6"/>
  <!-- Visor highlight -->
  <rect x="14" y="5.2" width="4" height="0.5" rx="0.2" fill="#f88" opacity="0.5"/>

  <!-- Antennae -->
  <line x1="15" y1="3.5" x2="13.5" y2="0.8" stroke="#aaa" stroke-width="0.6" stroke-linecap="round"/>
  <circle cx="13.5" cy="0.8" r="1" fill="url(#titan-antenna-glow)" filter="url(#titan-antenna-filter)"/>
  <circle cx="13.5" cy="0.8" r="0.5" fill="#f44"/>

  <line x1="23" y1="3.5" x2="24.5" y2="0.8" stroke="#aaa" stroke-width="0.6" stroke-linecap="round"/>
  <circle cx="24.5" cy="0.8" r="1" fill="url(#titan-antenna-glow)" filter="url(#titan-antenna-filter)"/>
  <circle cx="24.5" cy="0.8" r="0.5" fill="#f44"/>
</svg>
