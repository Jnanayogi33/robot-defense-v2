<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 26">
  <defs>
    <!-- Torso metallic gradient -->
    <linearGradient id="soldier-body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bb8800"/>
      <stop offset="50%" stop-color="#997700"/>
      <stop offset="100%" stop-color="#885500"/>
    </linearGradient>
    <!-- Shoulder armor gradient -->
    <linearGradient id="soldier-shoulder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#aa7700"/>
      <stop offset="100%" stop-color="#664400"/>
    </linearGradient>
    <!-- Leg gradient -->
    <linearGradient id="soldier-leg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#776655"/>
      <stop offset="50%" stop-color="#998877"/>
      <stop offset="100%" stop-color="#665544"/>
    </linearGradient>
    <!-- Head gradient -->
    <linearGradient id="soldier-head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#aa7700"/>
      <stop offset="100%" stop-color="#775500"/>
    </linearGradient>
    <!-- Gun metallic -->
    <linearGradient id="soldier-gun" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#666"/>
      <stop offset="40%" stop-color="#888"/>
      <stop offset="100%" stop-color="#555"/>
    </linearGradient>
    <!-- Eye glow radial -->
    <radialGradient id="soldier-eye-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffcc44" stop-opacity="1"/>
      <stop offset="60%" stop-color="#ffaa00" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffaa00" stop-opacity="0"/>
    </radialGradient>
    <!-- Boot gradient -->
    <linearGradient id="soldier-boot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
    <!-- Eye glow filter -->
    <filter id="soldier-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.7"/>
    </filter>
  </defs>

  <!-- Left leg (rear, walking pose) -->
  <g>
    <line x1="7" y1="17.5" x2="5.5" y2="20.5" stroke="url(#soldier-leg)" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="5.5" y1="20.5" x2="6.5" y2="23" stroke="url(#soldier-leg)" stroke-width="2" stroke-linecap="round"/>
    <!-- Boot -->
    <rect x="5" y="22.5" width="3.5" height="2" rx="0.5" fill="url(#soldier-boot)" stroke="#222" stroke-width="0.3"/>
    <line x1="5.5" y1="23.5" x2="8" y2="23.5" stroke="#444" stroke-width="0.3"/>
    <!-- Knee joint -->
    <circle cx="5.5" cy="20.5" r="1" fill="#887766" stroke="#554433" stroke-width="0.3"/>
  </g>

  <!-- Right leg (forward) -->
  <g>
    <line x1="11" y1="17.5" x2="13" y2="20" stroke="url(#soldier-leg)" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="13" y1="20" x2="11.5" y2="23" stroke="url(#soldier-leg)" stroke-width="2" stroke-linecap="round"/>
    <!-- Boot -->
    <rect x="10" y="22.5" width="3.5" height="2" rx="0.5" fill="url(#soldier-boot)" stroke="#222" stroke-width="0.3"/>
    <line x1="10.5" y1="23.5" x2="13" y2="23.5" stroke="#444" stroke-width="0.3"/>
    <!-- Knee joint -->
    <circle cx="13" cy="20" r="1" fill="#887766" stroke="#554433" stroke-width="0.3"/>
  </g>

  <!-- Torso - stocky and armored -->
  <rect x="5" y="8" width="8" height="10" rx="1.2" fill="url(#soldier-body)" stroke="#664400" stroke-width="0.5"/>
  <!-- Center panel line -->
  <line x1="9" y1="9" x2="9" y2="17" stroke="#664400" stroke-width="0.4" opacity="0.5"/>
  <!-- Horizontal panel lines -->
  <line x1="5.5" y1="11" x2="12.5" y2="11" stroke="#664400" stroke-width="0.3" opacity="0.5"/>
  <line x1="5.5" y1="14" x2="12.5" y2="14" stroke="#664400" stroke-width="0.3" opacity="0.5"/>
  <!-- Chest plate accent -->
  <rect x="6" y="9" width="6" height="4" rx="0.5" fill="none" stroke="#cc9922" stroke-width="0.3" opacity="0.4"/>

  <!-- Belt / waist detail -->
  <rect x="4.8" y="14.5" width="8.4" height="1.5" rx="0.3" fill="#554422" stroke="#443311" stroke-width="0.3"/>
  <rect x="8" y="14.6" width="1.5" height="1.3" rx="0.2" fill="#776633"/> <!-- Belt buckle -->
  <circle cx="6.5" cy="15.3" r="0.4" fill="#887744"/> <!-- Belt pouch -->

  <!-- Left shoulder armor (rounded pad) -->
  <ellipse cx="4.5" cy="9" rx="2.2" ry="1.5" fill="url(#soldier-shoulder)" stroke="#553300" stroke-width="0.4"/>
  <line x1="3" y1="9" x2="6" y2="9" stroke="#aa8844" stroke-width="0.3" opacity="0.3"/>

  <!-- Right shoulder armor -->
  <ellipse cx="13.5" cy="9" rx="2.2" ry="1.5" fill="url(#soldier-shoulder)" stroke="#553300" stroke-width="0.4"/>
  <line x1="12" y1="9" x2="15" y2="9" stroke="#aa8844" stroke-width="0.3" opacity="0.3"/>

  <!-- Left arm (hanging) -->
  <line x1="4.5" y1="10" x2="3.5" y2="14" stroke="#887766" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="3.5" cy="14" r="0.8" fill="#776655"/> <!-- Fist -->

  <!-- Right arm holding rifle -->
  <line x1="13.5" y1="10" x2="15" y2="13" stroke="#887766" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Rifle -->
  <rect x="14" y="11.5" width="7" height="1.4" rx="0.3" fill="url(#soldier-gun)" stroke="#444" stroke-width="0.3"/>
  <!-- Barrel -->
  <rect x="20" y="11.8" width="1.5" height="0.8" rx="0.2" fill="#777" stroke="#555" stroke-width="0.2"/>
  <!-- Stock -->
  <rect x="13" y="12" width="1.5" height="1.8" rx="0.3" fill="#555"/>
  <!-- Grip -->
  <rect x="16" y="12.8" width="0.8" height="1.5" rx="0.2" fill="#666"/>

  <!-- Neck -->
  <rect x="7.5" y="6" width="3" height="2.5" rx="0.4" fill="#776655" stroke="#554433" stroke-width="0.3"/>

  <!-- Head - rectangular -->
  <rect x="5.5" y="3" width="7" height="3.5" rx="0.8" fill="url(#soldier-head)" stroke="#553300" stroke-width="0.5"/>
  <!-- Head ridge -->
  <line x1="6" y1="3.5" x2="12" y2="3.5" stroke="#cc9922" stroke-width="0.3" opacity="0.3"/>

  <!-- Eye slits glow (behind) -->
  <rect x="6.5" y="4.5" width="2" height="0.8" rx="0.2" fill="url(#soldier-eye-glow)" filter="url(#soldier-glow)"/>
  <rect x="9.5" y="4.5" width="2" height="0.8" rx="0.2" fill="url(#soldier-eye-glow)" filter="url(#soldier-glow)"/>
  <!-- Eye slits -->
  <rect x="6.5" y="4.5" width="2" height="0.8" rx="0.2" fill="#fa0" opacity="0.9"/>
  <rect x="9.5" y="4.5" width="2" height="0.8" rx="0.2" fill="#fa0" opacity="0.9"/>
  <!-- Eye highlights -->
  <rect x="7" y="4.6" width="0.8" height="0.3" rx="0.1" fill="#ffc" opacity="0.5"/>
  <rect x="10" y="4.6" width="0.8" height="0.3" rx="0.1" fill="#ffc" opacity="0.5"/>
</svg>
