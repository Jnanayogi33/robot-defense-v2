<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Future Defense: Robot Uprising</title>
<link rel="stylesheet" href="src/css/styles.css">
</head>
<body>
<h1>Future Defense</h1>
<div id="hud">
  <span>Credits: <span class="val" id="money">200</span></span>
  <span>Wave: <span class="val" id="wave">0</span></span>
  <span>Lives: <span class="val" id="lives">20</span></span>
  <span>Score: <span class="val" id="score">0</span></span>
</div>
<div id="shop"></div>
<div id="controls">
  <button>Next Wave</button>
  <button>Sell Tower</button>
  <button id="mute-btn">Sound: ON</button>
</div>
<canvas id="c"></canvas>
<div id="msg"></div>

<div id="overlay">
  <div id="overlay-box">
    <h2 id="ov-title"></h2>
    <p id="ov-text"></p>
    <button>Play Again</button>
  </div>
</div>

<script type="module" src="src/js/main.js"></script>
</body>
</html>
